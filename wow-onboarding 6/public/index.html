<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WOW Aceleradora · Onboarding do Investidor — Investac VII</title>
  <meta name="description" content="Jornada de entrada para novos investidores do fundo Investac VII da WOW Aceleradora." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fonte oficial da marca: Visby CF (licenciada). Poppins é usada como
       substituta gratuita e fiel; troque por Visby CF quando tiver a licença. -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Fundo decorativo -->
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <!-- Cabeçalho fixo com marca + progresso -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="brand-logo" src="logo-wow-marca.svg" alt="WOW Aceleradora" />
        <span class="brand-sub">Investac VII</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-meta">
          <span id="progressLabel">Etapa 1 de 9</span>
          <span id="progressPct" class="progress-pct">0%</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Trilha de badges -->
  <nav class="badges" id="badges" aria-label="Conquistas"></nav>

  <!-- Palco das etapas -->
  <main class="stage" id="stage"></main>

  <!-- Toast de incentivo -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Confete (celebração) -->
  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <script src="app.js"></script>
</body>
</html>
